name: Build Desktop

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 打包目标
        required: true
        default: windows
        type: choice
        options:
          - windows
          - macos
          - all
  push:
    tags:
      - "v*"

concurrency:
  group: build-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Windows NSIS
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'windows' ||
      github.event.inputs.platform == 'all'
    runs-on: windows-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri
            local-service

      - name: Install npm dependencies
        shell: pwsh
        run: |
          npm ci --prefix extension
          npm ci --prefix frontend
          npm ci --prefix desktop

      - name: Build Windows installer
        shell: pwsh
        run: npm run build:win

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: huoke-windows-nsis
          path: desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-macos:
    name: macOS DMG
    if: >-
      github.event_name == 'push' ||
      github.event.inputs.platform == 'macos' ||
      github.event.inputs.platform == 'all'
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            extension/package-lock.json
            frontend/package-lock.json
            desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop/src-tauri
            local-service

      - name: Install npm dependencies
        run: |
          npm ci --prefix extension
          npm ci --prefix frontend
          npm ci --prefix desktop

      - name: Build macOS bundle
        run: npm run build:mac

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: huoke-macos-dmg
          path: desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: huoke-macos-app
          path: desktop/src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: error
